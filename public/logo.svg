<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" opacity="0.1"/>
  
  <!-- Sound waves -->
  <path d="M 25 50 Q 35 35, 50 50 T 75 50" stroke="url(#logoGrad)" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 30 50 Q 40 40, 50 50 T 70 50" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M 35 50 Q 42.5 45, 50 50 T 65 50" stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Central microphone/speaker element -->
  <g filter="url(#glow)">
    <!-- Main circle -->
    <circle cx="50" cy="50" r="12" fill="url(#logoGrad)"/>
    
    <!-- Inner sound waves -->
    <circle cx="50" cy="50" r="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <circle cx="50" cy="50" r="5" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
    
    <!-- Center dot -->
    <circle cx="50" cy="50" r="2" fill="white"/>
  </g>
  
  <!-- Subtle outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#logoGrad)" stroke-width="0.5" opacity="0.3"/>
</svg>
