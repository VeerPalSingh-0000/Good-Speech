<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main filled circle -->
  <circle cx="50" cy="50" r="48" fill="url(#logoGrad)" filter="url(#glow)"/>
  
  <!-- Sound wave pattern cutouts -->
  <path d="M 25 50 Q 35 35, 50 50 T 75 50" stroke="white" stroke-width="3" fill="none" opacity="0.9"/>
  <path d="M 30 50 Q 40 40, 50 50 T 70 50" stroke="white" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 35 50 Q 42.5 45, 50 50 T 65 50" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Central speaker/microphone element -->
  <g>
    <!-- Main white circle -->
    <circle cx="50" cy="50" r="15" fill="white" opacity="0.95"/>
    
    <!-- Inner gradient circle -->
    <circle cx="50" cy="50" r="10" fill="url(#logoGrad)"/>
    
    <!-- Sound waves in center -->
    <path d="M 45 50 Q 47.5 47, 50 50 T 55 50" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M 43 50 Q 46.5 46, 50 50 T 57 50" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
    
    <!-- Center dot -->
    <circle cx="50" cy="50" r="3" fill="white"/>
  </g>
</svg>
